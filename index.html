<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Hiling Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#2563eb,#1e40af);
    min-height:100vh;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}
h1{
    text-align:center;
    margin-bottom:20px;
}
h3{
    margin:20px 0 10px;
}
input{
    padding:12px;
    width:100%;
    margin:6px 0;
    border:1px solid #ddd;
    border-radius:10px;
}
button{
    padding:12px 18px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    cursor:pointer;
}
button:hover{
    opacity:.9;
}
.card{
    background:#f8fafc;
    padding:18px;
    border-radius:12px;
    margin-top:15px;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th,td{
    padding:12px;
    border-bottom:1px solid #eee;
    text-align:left;
}
th{
    background:#2563eb;
    color:white;
}
.delete{
    background:#dc2626;
}
.footer{
    text-align:center;
    margin-top:20px;
    color:#666;
}
@media(max-width:768px){
    table{
        font-size:12px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>💸 Kas Hiling Pro</h1>

    <h3>Total Pengeluaran</h3>
    <input type="number" id="pengeluaran" placeholder="Contoh 1500000">
    <button onclick="setBiaya()">Simpan Biaya</button>

    <div class="card">
        Total Biaya: Rp <span id="totalBiaya">0</span><br><br>
        Jumlah Peserta: <span id="jumlahPeserta">0</span><br><br>
        Biaya Per Orang: Rp <span id="perOrang">0</span>
    </div>

    <h3>Tambah Peserta</h3>
    <input type="text" id="nama" placeholder="Nama Peserta">
    <input type="number" id="bayar" placeholder="Nominal Bayar">
    <button onclick="tambahPeserta()">Tambah</button>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Bayar</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="pesertaBody"></tbody>
    </table>

    <div class="card">
        Total Terkumpul: Rp <span id="terkumpul">0</span><br><br>
        Kekurangan / Sisa: Rp <span id="sisa">0</span>
    </div>

    <div class="footer">
        Kas Hiling Pro © 2026
    </div>
</div>

<script>
let peserta = JSON.parse(localStorage.getItem("peserta")) || [];
let totalBiaya = Number(localStorage.getItem("totalBiaya")) || 0;

function save(){
    localStorage.setItem("peserta", JSON.stringify(peserta));
    localStorage.setItem("totalBiaya", totalBiaya);
}

function setBiaya(){
    totalBiaya = Number(document.getElementById('pengeluaran').value);
    save();
    update();
}

function tambahPeserta(){
    const nama = document.getElementById('nama').value;
    const bayar = Number(document.getElementById('bayar').value);

    if(!nama || !bayar) return alert("Isi data dulu");

    peserta.push({nama,bayar});

    document.getElementById('nama').value="";
    document.getElementById('bayar').value="";

    save();
    update();
}

function hapus(index){
    peserta.splice(index,1);
    save();
    update();
}

function format(num){
    return num.toLocaleString('id-ID');
}

function update(){
    let body="";
    let perOrang = peserta.length > 0 ? Math.ceil(totalBiaya/peserta.length) : 0;
    let terkumpul = 0;

    peserta.forEach((p,index)=>{
        terkumpul += p.bayar;

        let status;
        if(p.bayar >= perOrang){
            status = "✅ Lunas";
        }else{
            status = `❌ Kurang Rp ${format(perOrang-p.bayar)}`;
        }

        body += `
        <tr>
            <td>${index+1}</td>
            <td>${p.nama}</td>
            <td>Rp ${format(p.bayar)}</td>
            <td>${status}</td>
            <td><button class="delete" onclick="hapus(${index})">Hapus</button></td>
        </tr>
        `;
    });

    document.getElementById("pesertaBody").innerHTML = body;
    document.getElementById("jumlahPeserta").innerText = peserta.length;
    document.getElementById("perOrang").innerText = format(perOrang);
    document.getElementById("totalBiaya").innerText = format(totalBiaya);
    document.getElementById("terkumpul").innerText = format(terkumpul);
    document.getElementById("sisa").innerText = format(totalBiaya-terkumpul);
}

update();
</script>
</body>
</html>
