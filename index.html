<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kas Hiling Realtime</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:Arial;
 background:linear-gradient(135deg,#2563eb,#1e3a8a);
 padding:20px;
 min-height:100vh;
}
.container{
 max-width:1000px;
 margin:auto;
 background:#fff;
 padding:25px;
 border-radius:20px;
 box-shadow:0 20px 50px rgba(0,0,0,.2);
}
h1{text-align:center;margin-bottom:20px}
input{
 width:100%;
 padding:12px;
 margin:8px 0;
 border:1px solid #ddd;
 border-radius:10px;
}
button{
 padding:12px 18px;
 border:none;
 border-radius:10px;
 background:#2563eb;
 color:#fff;
 cursor:pointer;
}
.delete{background:#dc2626}
table{
 width:100%;
 border-collapse:collapse;
 margin-top:20px;
}
th,td{
 border-bottom:1px solid #ddd;
 padding:12px;
}
th{background:#2563eb;color:white}
.card{
 background:#f3f4f6;
 padding:15px;
 border-radius:12px;
 margin-top:15px;
}
</style>
</head>
<body>

<div class="container">
<h1>💸 Kas Hiling Realtime</h1>

<input id="pengeluaran" type="number" placeholder="Total Biaya">
<button onclick="setBiaya()">Simpan Biaya</button>

<div class="card">
Total Biaya: Rp <span id="totalBiaya">0</span><br><br>
Jumlah Peserta: <span id="jumlahPeserta">0</span><br><br>
Biaya / Orang: Rp <span id="perOrang">0</span>
</div>

<h3 style="margin-top:20px">Tambah Peserta</h3>
<input id="nama" placeholder="Nama">
<input id="bayar" type="number" placeholder="Bayar">
<button onclick="tambahPeserta()">Tambah</button>

<table>
<thead>
<tr>
<th>No</th>
<th>Nama</th>
<th>Bayar</th>
<th>Status</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="pesertaBody"></tbody>
</table>

<div class="card">
Total Terkumpul: Rp <span id="terkumpul">0</span><br><br>
Sisa: Rp <span id="sisa">0</span>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
 getFirestore,
 doc,
 setDoc,
 getDoc,
 collection,
 addDoc,
 onSnapshot,
 deleteDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA2BL9QZwuQmNOB5tyO2PN8ok-9ao8m3Io",
  authDomain: "test-mode-fb88e.firebaseapp.com",
  projectId: "test-mode-fb88e",
  storageBucket: "test-mode-fb88e.firebasestorage.app",
  messagingSenderId: "765554892957",
  appId: "1:765554892957:web:d78d1f8729742d0746b474"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let peserta = [];
let totalBiaya = 0;

window.setBiaya = async function(){
 totalBiaya = Number(document.getElementById("pengeluaran").value);
 await setDoc(doc(db,"settings","biaya"),{
   totalBiaya
 });
 update();
}

window.tambahPeserta = async function(){
 const nama=document.getElementById("nama").value;
 const bayar=Number(document.getElementById("bayar").value);

 if(!nama || !bayar) return;

 await addDoc(collection(db,"peserta"),{
   nama,bayar
 });

 document.getElementById("nama").value="";
 document.getElementById("bayar").value="";
}

window.hapus = async function(id){
 await deleteDoc(doc(db,"peserta",id));
}

function format(num){
 return num.toLocaleString("id-ID");
}

async function loadBiaya(){
 const snap=await getDoc(doc(db,"settings","biaya"));
 if(snap.exists()){
   totalBiaya=snap.data().totalBiaya;
   update();
 }
}

function update(){
 let body="";
 let perOrang = peserta.length ? Math.ceil(totalBiaya/peserta.length) : 0;
 let terkumpul=0;

 peserta.forEach((p,index)=>{
   terkumpul += p.bayar;

   let status = p.bayar >= perOrang
    ? "✅ Lunas"
    : `❌ Kurang Rp ${format(perOrang-p.bayar)}`;

   body += `
   <tr>
    <td>${index+1}</td>
    <td>${p.nama}</td>
    <td>Rp ${format(p.bayar)}</td>
    <td>${status}</td>
    <td><button class="delete" onclick="hapus('${p.id}')">Hapus</button></td>
   </tr>
   `;
 });

 document.getElementById("pesertaBody").innerHTML = body;
 document.getElementById("jumlahPeserta").innerText = peserta.length;
 document.getElementById("perOrang").innerText = format(perOrang);
 document.getElementById("totalBiaya").innerText = format(totalBiaya);
 document.getElementById("terkumpul").innerText = format(terkumpul);
 document.getElementById("sisa").innerText = format(totalBiaya-terkumpul);
}

onSnapshot(collection(db,"peserta"),(snapshot)=>{
 peserta=[];
 snapshot.forEach(doc=>{
   peserta.push({
    id:doc.id,
    ...doc.data()
   });
 });
 update();
});

loadBiaya();
</script>
</body>
</html>
