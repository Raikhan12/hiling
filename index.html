<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kas Hiling Pro</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Halaman Login -->
<div id="loginPage" class="login-page hidden">
  <div class="login-box glass-panel">
    <h1>💸 Kas Hiling Pro</h1>
    <input id="username" placeholder="Username (admin / member)" autofocus>
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="guestLogin()" class="secondary">Masuk sebagai Guest</button>
    <p id="error"></p>
  </div>
</div>

<!-- Halaman Dashboard Aplikasi -->
<div class="container glass-panel hidden" id="app">
  <!-- Topbar Navigation -->
  <div class="topbar">
    <h1>Kas Hiling Pro</h1>
    <div>
      <span id="roleText">Guest</span>
      <button onclick="logout()" class="secondary">Logout</button>
    </div>
  </div>

  <!-- Admin Panel: Mengatur Biaya Kegiatan -->
  <div class="admin-only hidden">
    <input id="pengeluaran" type="number" placeholder="Masukkan Total Biaya Kegiatan (Rp)">
    <button onclick="setBiaya()">Simpan Biaya</button>
  </div>

  <!-- Dashboard Ringkasan Finansial Atas -->
  <div class="card-grid">
    <div class="card glass-panel">
      <div class="card-header-icon">
        <div class="card-label">Total Biaya</div>
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>
      </div>
      <div class="card-value">Rp <span id="totalBiaya">0</span></div>
    </div>
    <div class="card glass-panel">
      <div class="card-header-icon">
        <div class="card-label">Jumlah Peserta</div>
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </div>
      <div class="card-value"><span id="jumlahPeserta">0</span> Orang</div>
    </div>
    <div class="card glass-panel">
      <div class="card-header-icon">
        <div class="card-label">Biaya / Orang</div>
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <div class="card-value">Rp <span id="perOrang">0</span></div>
    </div>
  </div>

  <!-- Progress Bar Pengumpulan Dana -->
  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
    <div class="progress-text" id="progressText">Terkumpul 0% (Rp 0 / Rp 0)</div>
  </div>

  <!-- Admin Panel: Tambah Peserta Baru -->
  <div class="admin-only hidden" style="margin-top: 15px;">
    <input id="nama" placeholder="Nama Lengkap Peserta">
    <input id="bayar" type="number" placeholder="Jumlah Bayar Awal (Rp)">
    <button onclick="tambahPeserta()">Tambah Peserta</button>
  </div>

  <!-- Search & Filter Bar -->
  <div class="search-filter-row">
    <div class="search-wrapper">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input id="searchPeserta" placeholder="Cari nama peserta..." oninput="filterPeserta()">
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" id="tabAll" onclick="setFilter('all')">Semua</button>
      <button class="filter-tab" id="tabLunas" onclick="setFilter('lunas')">Lunas</button>
      <button class="filter-tab" id="tabKurang" onclick="setFilter('kurang')">Belum Lunas</button>
    </div>
  </div>

  <!-- Tabel Data Patungan Peserta -->
  <div class="table-responsive">
    <table>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama Peserta</th>
          <th>Sudah Bayar</th>
          <th>Status Patungan</th>
          <th>Aksi</th>
        </tr>
      </thead>
      <tbody id="pesertaBody"></tbody>
    </table>
  </div>

  <!-- Dashboard Ringkasan Finansial Bawah -->
  <div class="card-grid">
    <div class="card glass-panel">
      <div class="card-header-icon">
        <div class="card-label">Uang Terkumpul</div>
        <svg class="card-icon" style="color: #34d399;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></svg>
      </div>
      <div class="card-value" style="color: #34d399;">Rp <span id="terkumpul">0</span></div>
    </div>
    <div class="card glass-panel">
      <div class="card-header-icon">
        <div class="card-label">Sisa Kekurangan</div>
        <svg class="card-icon" style="color: #f87171;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/></svg>
      </div>
      <div class="card-value">Rp <span id="sisa">0</span></div>
    </div>
  </div>

  <!-- Bagikan Laporan -->
  <div class="share-container">
    <button onclick="bagikanLaporan()" class="btn-share">
      <svg viewBox="0 0 24 24">
        <path d="M17.472 14.382c-.022-.08-.124-.22-.364-.34-.24-.12-1.418-.7-1.638-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-.992-.367-1.89-1.167-.701-.624-1.173-1.396-1.31-1.636-.14-.24-.015-.37.106-.49.11-.107.242-.28.363-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.195-.476-.393-.41-.54-.418-.14-.008-.3-.008-.46-.008-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2 0 1.18.86 2.32.98 2.48.12.16 1.69 2.581 4.1 3.624.575.248 1.025.395 1.377.508.578.183 1.103.157 1.517.097.46-.067 1.418-.58 1.62-.114.2-.54.2-1 .2-1.08.02-.08-.013-.15-.022-.23zm.193-8.854C15.827 3.864 13.978 3 12 3c-4.968 0-9 4.032-9 9 0 1.587.415 3.136 1.205 4.502L3 21l4.636-1.218A8.956 8.956 0 0 0 12 21c4.968 0 9-4.032 9-9 0-1.978-.77-3.83-2.335-5.472zM12 19.5c-1.435 0-2.842-.387-4.075-1.12l-.293-.174-2.735.717.73-2.666-.192-.306A7.463 7.463 0 0 1 4.5 12c0-4.136 3.364-7.5 7.5-7.5 2.003 0 3.887.78 5.305 2.197A7.462 7.462 0 0 1 19.5 12c0 4.136-3.364 7.5-7.5 7.5z"/>
      </svg>
      Bagikan Laporan ke WhatsApp
    </button>
  </div>
</div>

<!-- Modal Sunting/Edit Pembayaran Peserta -->
<div id="editModal" class="modal-overlay">
  <div class="modal-box glass-panel">
    <h2>
      <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/>
      </svg>
      Sunting Pembayaran
    </h2>
    <div class="modal-body">
      <input type="hidden" id="editIndex">
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label>Nama Peserta</label>
        <input id="editNama" type="text" disabled style="background: rgba(255,255,255,0.05); color: var(--text-muted); cursor: not-allowed;">
      </div>
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <label>Jumlah Sudah Bayar (Rp)</label>
        <input id="editBayar" type="number" placeholder="Masukkan jumlah bayar baru" autofocus>
      </div>
    </div>
    <div class="modal-footer">
      <button onclick="tutupEditModal()" class="secondary">Batal</button>
      <button onclick="simpanEditPembayaran()" class="primary">Simpan Perubahan</button>
    </div>
  </div>
</div>


<script type="module" src="./index.js"></script>
</body>
</html>
